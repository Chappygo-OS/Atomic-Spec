# ============================================================================
# VERIFICATION COMMAND TEMPLATES
# ============================================================================
# Platform-specific verification commands for atomic tasks.
# This file enables tasks.md to generate executable verification commands
# appropriate to each project's target platform.
#
# USAGE IN TASK GENERATION (Section 4.2.2):
# 1. Read target platform from registry (backend.language, frontend.framework,
#    or target_platform.primary)
# 2. Select appropriate command template from this file
# 3. Replace placeholders with task-specific values
# 4. Embed fallback commands when primary tool may be unavailable
#
# PLACEHOLDER SYNTAX:
# - {{TEST_NAME}} - Specific test name or pattern
# - {{FILE_PATH}} - Path to file being tested
# - {{ENDPOINT}} - API endpoint path
# - {{SCHEME}} - Project scheme name (iOS)
# - {{MODULE}} - Module/package name
# - {{PORT}} - Server port number (default: 8000 for backend, 3000 for frontend)
# ============================================================================

version: 1
created: 2026-03-02
last_updated: 2026-03-02

# ============================================================================
# PLATFORM DETECTION RULES
# ============================================================================
# Use these rules to determine which platform templates to apply
# ============================================================================
platform_detection:
  # Primary detection: Check registry values first
  registry_keys:
    ios:
      - target_platform.mobile_platforms: "ios"
      - target_platform.mobile_platforms: "both"
      - mobile.iap_framework: "storekit2"
    android:
      - target_platform.mobile_platforms: "android"
      - target_platform.mobile_platforms: "both"
      - mobile.iap_framework: "billing_client"
    react_native:
      - target_platform.mobile_framework: "react-native"
    flutter:
      - target_platform.mobile_framework: "flutter"
    web_node:
      - backend.language: "typescript"
      - backend.framework: "express"
      - backend.framework: "nestjs"
    python:
      - backend.language: "python"
      - backend.framework: "fastapi"
      - backend.framework: "django"
      - backend.framework: "flask"
    go:
      - backend.language: "go"
      - backend.framework: "gin"
      - backend.framework: "fiber"

  # Secondary detection: File pattern scanning
  file_patterns:
    ios:
      - "*.xcodeproj"
      - "*.xcworkspace"
      - "Package.swift"
      - "Podfile"
    android:
      - "build.gradle"
      - "build.gradle.kts"
      - "settings.gradle"
      - "AndroidManifest.xml"
    react_native:
      - "metro.config.js"
      - "react-native.config.js"
      - "app.json" # with "expo" or "name" + "displayName"
    flutter:
      - "pubspec.yaml"
      - "lib/main.dart"
    web_node:
      - "package.json"
      - "tsconfig.json"
    python:
      - "pyproject.toml"
      - "requirements.txt"
      - "setup.py"
      - "Pipfile"
    go:
      - "go.mod"
      - "go.sum"

# ============================================================================
# WEB / NODE.JS PLATFORM
# ============================================================================
web_node:
  description: "Node.js, TypeScript, npm-based web projects"

  unit_tests:
    primary:
      tool: "npm/vitest"
      command: 'npm test -- --grep "{{TEST_NAME}}"'
      expected_output: "PASS {{TEST_NAME}}"
    alternatives:
      - tool: "npm/jest"
        command: 'npx jest --testNamePattern="{{TEST_NAME}}"'
        expected_output: "PASS"
      - tool: "npm/mocha"
        command: 'npx mocha --grep "{{TEST_NAME}}"'
        expected_output: "passing"
    fallback:
      command: 'node -e "require(\"{{FILE_PATH}}\"); console.log(\"Module loads successfully\")"'
      expected_output: "Module loads successfully"

  type_check:
    primary:
      tool: "tsc"
      command: "npx tsc --noEmit {{FILE_PATH}}"
      expected_output: "No errors"
    alternatives:
      - tool: "tsc-project"
        command: "npx tsc --noEmit"
        expected_output: "No errors"
    fallback:
      command: 'node -e "require(\"{{FILE_PATH}}\")"'
      expected_output: "No syntax errors"

  lint:
    primary:
      tool: "eslint"
      command: "npx eslint {{FILE_PATH}} --max-warnings=0"
      expected_output: "No warnings or errors"
    alternatives:
      - tool: "biome"
        command: "npx biome check {{FILE_PATH}}"
        expected_output: "No issues found"
    fallback:
      command: "node --check {{FILE_PATH}}"
      expected_output: "Syntax OK"

  build:
    primary:
      tool: "npm"
      command: "npm run build"
      expected_output: "Build completed"
    alternatives:
      - tool: "vite"
        command: "npx vite build"
        expected_output: "built in"
      - tool: "webpack"
        command: "npx webpack --mode production"
        expected_output: "compiled successfully"

  api_health:
    primary:
      tool: "curl"
      command: 'curl -sf http://localhost:{{PORT}}/{{ENDPOINT}} | jq -e ".status"'
      expected_output: '"ok"'
    alternatives:
      - tool: "httpie"
        command: 'http GET http://localhost:{{PORT}}/{{ENDPOINT}} --check-status'
        expected_output: "HTTP/1.1 200"
      - tool: "wget"
        command: 'wget -qO- http://localhost:{{PORT}}/{{ENDPOINT}}'
        expected_output: "Response body"

  integration_tests:
    primary:
      tool: "supertest"
      command: 'npm run test:integration -- --grep "{{TEST_NAME}}"'
      expected_output: "PASS"
    alternatives:
      - tool: "playwright-api"
        command: 'npx playwright test --grep "{{TEST_NAME}}" --project=api'
        expected_output: "passed"
    fallback:
      command: 'curl -sf http://localhost:{{PORT}}/{{ENDPOINT}} && echo "Endpoint accessible"'
      expected_output: "Endpoint accessible"

  e2e_tests:
    primary:
      tool: "playwright"
      command: 'npx playwright test {{FILE_PATH}}'
      expected_output: "passed"
    alternatives:
      - tool: "cypress"
        command: 'npx cypress run --spec "{{FILE_PATH}}"'
        expected_output: "All specs passed"

# ============================================================================
# iOS PLATFORM (Swift, Xcode)
# ============================================================================
ios:
  description: "iOS native development with Swift, SwiftUI, Xcode"

  unit_tests:
    primary:
      tool: "xcodebuild"
      command: |
        xcodebuild test \
          -scheme {{SCHEME}} \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -only-testing:{{MODULE}}Tests/{{TEST_NAME}} \
          | xcpretty
      expected_output: "Test Succeeded"
    alternatives:
      - tool: "swift-test"
        command: 'swift test --filter "{{TEST_NAME}}"'
        expected_output: "Test Suite 'All tests' passed"
    fallback:
      command: |
        xcodebuild build \
          -scheme {{SCHEME}} \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          | xcpretty
      expected_output: "Build Succeeded"

  build:
    primary:
      tool: "xcodebuild"
      command: |
        xcodebuild build \
          -scheme {{SCHEME}} \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -configuration Debug \
          | xcpretty
      expected_output: "Build Succeeded"
    alternatives:
      - tool: "swift-build"
        command: "swift build"
        expected_output: "Build complete!"
      - tool: "fastlane"
        command: "bundle exec fastlane build"
        expected_output: "fastlane.tools finished successfully"

  lint:
    primary:
      tool: "swiftlint"
      command: "swiftlint lint {{FILE_PATH}} --strict"
      expected_output: "No violations"
    alternatives:
      - tool: "swiftformat"
        command: "swiftformat --lint {{FILE_PATH}}"
        expected_output: "No formatting issues"
    fallback:
      command: "swift -parse {{FILE_PATH}}"
      expected_output: "No syntax errors"

  type_check:
    primary:
      tool: "xcodebuild"
      command: |
        xcodebuild build \
          -scheme {{SCHEME}} \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          2>&1 | grep -E "(error:|warning:)" | head -20
      expected_output: "No errors"
    fallback:
      command: "swift -typecheck {{FILE_PATH}}"
      expected_output: "No errors"

  api_health:
    primary:
      tool: "curl"
      command: 'curl -sf http://localhost:{{PORT}}/{{ENDPOINT}} | jq -e ".status"'
      expected_output: '"ok"'
    note: "Use same API health checks as backend - iOS tasks verify against running backend"

  integration_tests:
    primary:
      tool: "xcodebuild"
      command: |
        xcodebuild test \
          -scheme {{SCHEME}} \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -testPlan IntegrationTests \
          | xcpretty
      expected_output: "Test Succeeded"
    alternatives:
      - tool: "xcrun-simctl"
        command: |
          xcrun simctl boot "iPhone 15" && \
          xcodebuild test -scheme {{SCHEME}} -destination 'platform=iOS Simulator,name=iPhone 15'
        expected_output: "Test Succeeded"

  ui_tests:
    primary:
      tool: "xcodebuild"
      command: |
        xcodebuild test \
          -scheme {{SCHEME}}UITests \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          -only-testing:{{MODULE}}UITests/{{TEST_NAME}} \
          | xcpretty
      expected_output: "Test Succeeded"

  simulator:
    primary:
      tool: "xcrun"
      command: |
        xcrun simctl boot "iPhone 15" && \
        open -a Simulator && \
        xcodebuild -scheme {{SCHEME}} -destination 'platform=iOS Simulator,name=iPhone 15' build
      expected_output: "Build Succeeded, Simulator running"

  archive:
    primary:
      tool: "xcodebuild"
      command: |
        xcodebuild archive \
          -scheme {{SCHEME}} \
          -archivePath ./build/{{SCHEME}}.xcarchive \
          -destination 'generic/platform=iOS' \
          | xcpretty
      expected_output: "Archive Succeeded"
    alternatives:
      - tool: "fastlane"
        command: "bundle exec fastlane gym"
        expected_output: "Successfully exported"

# ============================================================================
# ANDROID PLATFORM (Kotlin, Gradle)
# ============================================================================
android:
  description: "Android native development with Kotlin, Jetpack Compose, Gradle"

  unit_tests:
    primary:
      tool: "gradle"
      command: './gradlew test --tests "{{MODULE}}.{{TEST_NAME}}"'
      expected_output: "BUILD SUCCESSFUL"
    alternatives:
      - tool: "gradle-class"
        command: './gradlew testDebugUnitTest --tests "{{TEST_NAME}}"'
        expected_output: "BUILD SUCCESSFUL"
    fallback:
      command: "./gradlew compileDebugKotlin"
      expected_output: "BUILD SUCCESSFUL"

  build:
    primary:
      tool: "gradle"
      command: "./gradlew assembleDebug"
      expected_output: "BUILD SUCCESSFUL"
    alternatives:
      - tool: "gradle-release"
        command: "./gradlew assembleRelease"
        expected_output: "BUILD SUCCESSFUL"
      - tool: "fastlane"
        command: "bundle exec fastlane build"
        expected_output: "fastlane.tools finished successfully"

  lint:
    primary:
      tool: "ktlint"
      command: "./gradlew ktlintCheck"
      expected_output: "BUILD SUCCESSFUL"
    alternatives:
      - tool: "detekt"
        command: "./gradlew detekt"
        expected_output: "BUILD SUCCESSFUL"
      - tool: "android-lint"
        command: "./gradlew lintDebug"
        expected_output: "BUILD SUCCESSFUL"
    fallback:
      command: "./gradlew compileDebugKotlin"
      expected_output: "BUILD SUCCESSFUL"

  type_check:
    primary:
      tool: "gradle"
      command: "./gradlew compileDebugKotlin"
      expected_output: "BUILD SUCCESSFUL"

  api_health:
    primary:
      tool: "curl"
      command: 'curl -sf http://localhost:{{PORT}}/{{ENDPOINT}} | jq -e ".status"'
      expected_output: '"ok"'
    note: "Use same API health checks as backend - Android tasks verify against running backend"

  integration_tests:
    primary:
      tool: "gradle"
      command: './gradlew connectedDebugAndroidTest --tests "{{TEST_NAME}}"'
      expected_output: "BUILD SUCCESSFUL"
    alternatives:
      - tool: "adb"
        command: |
          adb shell am instrument -w \
            -e class {{MODULE}}.{{TEST_NAME}} \
            {{PACKAGE}}.test/androidx.test.runner.AndroidJUnitRunner
        expected_output: "OK (1 test)"

  ui_tests:
    primary:
      tool: "gradle"
      command: './gradlew connectedDebugAndroidTest --tests "*{{TEST_NAME}}*"'
      expected_output: "BUILD SUCCESSFUL"
    alternatives:
      - tool: "maestro"
        command: "maestro test flows/{{TEST_NAME}}.yaml"
        expected_output: "Flow completed successfully"

  emulator:
    primary:
      tool: "adb"
      command: |
        emulator -avd Pixel_7_API_34 -no-snapshot &
        adb wait-for-device && \
        ./gradlew installDebug
      expected_output: "Installed on device"
    alternatives:
      - tool: "gradle"
        command: "./gradlew installDebug"
        expected_output: "BUILD SUCCESSFUL"

  bundle:
    primary:
      tool: "gradle"
      command: "./gradlew bundleRelease"
      expected_output: "BUILD SUCCESSFUL"
    alternatives:
      - tool: "fastlane"
        command: "bundle exec fastlane supply"
        expected_output: "fastlane.tools finished successfully"

