# ============================================================================
# PYTHON BACKEND
# ============================================================================
python:
  description: "Python backend with FastAPI, Django, or Flask"

  unit_tests:
    primary:
      tool: "pytest"
      command: 'pytest -xvs -k "{{TEST_NAME}}"'
      expected_output: "passed"
    alternatives:
      - tool: "pytest-file"
        command: "pytest {{FILE_PATH}} -xvs"
        expected_output: "passed"
      - tool: "unittest"
        command: 'python -m unittest {{MODULE}}.{{TEST_NAME}}'
        expected_output: "OK"
    fallback:
      command: "python -m py_compile {{FILE_PATH}}"
      expected_output: "No syntax errors"

  build:
    primary:
      tool: "pip"
      command: "pip install -e ."
      expected_output: "Successfully installed"
    alternatives:
      - tool: "poetry"
        command: "poetry build"
        expected_output: "Built"
      - tool: "uv"
        command: "uv build"
        expected_output: "Built"

  lint:
    primary:
      tool: "ruff"
      command: "ruff check {{FILE_PATH}}"
      expected_output: "All checks passed!"
    alternatives:
      - tool: "flake8"
        command: "flake8 {{FILE_PATH}}"
        expected_output: "No issues"
      - tool: "pylint"
        command: "pylint {{FILE_PATH}}"
        expected_output: "rated at 10.00/10"
    fallback:
      command: "python -m py_compile {{FILE_PATH}}"
      expected_output: "No syntax errors"

  type_check:
    primary:
      tool: "mypy"
      command: "mypy {{FILE_PATH}} --strict"
      expected_output: "Success: no issues found"
    alternatives:
      - tool: "pyright"
        command: "pyright {{FILE_PATH}}"
        expected_output: "0 errors"

  format:
    primary:
      tool: "ruff"
      command: "ruff format --check {{FILE_PATH}}"
      expected_output: "would be left unchanged"
    alternatives:
      - tool: "black"
        command: "black --check {{FILE_PATH}}"
        expected_output: "would be left unchanged"

  api_health:
    primary:
      tool: "curl"
      command: 'curl -sf http://localhost:{{PORT}}/{{ENDPOINT}} | jq -e ".status"'
      expected_output: '"ok"'
    alternatives:
      - tool: "httpx"
        command: 'python -c "import httpx; r=httpx.get(\"http://localhost:{{PORT}}/{{ENDPOINT}}\"); print(r.json())"'
        expected_output: '{"status": "ok"}'

  integration_tests:
    primary:
      tool: "pytest"
      command: 'pytest tests/integration/ -xvs -k "{{TEST_NAME}}"'
      expected_output: "passed"
    alternatives:
      - tool: "pytest-httpx"
        command: 'pytest -xvs --httpx-mock -k "{{TEST_NAME}}"'
        expected_output: "passed"

  migration:
    primary:
      tool: "alembic"
      command: "alembic upgrade head && alembic check"
      expected_output: "No new upgrade operations detected"
    alternatives:
      - tool: "django"
        command: "python manage.py migrate --check"
        expected_output: "No migrations to apply"

