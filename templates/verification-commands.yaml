  unit_tests:
    primary:
      tool: "go"
      command: 'go test -v -run "{{TEST_NAME}}" ./...'
      expected_output: "PASS"
    alternatives:
      - tool: "go-pkg"
        command: 'go test -v -run "{{TEST_NAME}}" ./{{MODULE}}/...'
        expected_output: "PASS"
    fallback:
      command: "go build ./..."
      expected_output: "No errors"

  build:
    primary:
      tool: "go"
      command: "go build -o ./bin/app ./cmd/..."
      expected_output: "Build successful"
    alternatives:
      - tool: "go-simple"
        command: "go build ./..."
        expected_output: "Build successful"

  lint:
    primary:
      tool: "golangci-lint"
      command: "golangci-lint run {{FILE_PATH}}"
      expected_output: "No issues"
    alternatives:
      - tool: "staticcheck"
        command: "staticcheck ./..."
        expected_output: "No issues"
      - tool: "go-vet"
        command: "go vet ./..."
        expected_output: "No issues"
    fallback:
      command: "go build ./..."
      expected_output: "No errors"

  type_check:
    primary:
      tool: "go"
      command: "go build ./..."
      expected_output: "Build successful"
    note: "Go has built-in type checking during compilation"

  format:
    primary:
      tool: "gofmt"
      command: "gofmt -l {{FILE_PATH}} | wc -l"
      expected_output: "0"
    alternatives:
      - tool: "goimports"
        command: "goimports -l {{FILE_PATH}} | wc -l"
        expected_output: "0"

  api_health:
    primary:
      tool: "curl"
      command: 'curl -sf http://localhost:{{PORT}}/{{ENDPOINT}} | jq -e ".status"'
      expected_output: '"ok"'

  integration_tests:
    primary:
      tool: "go"
      command: 'go test -v -tags=integration -run "{{TEST_NAME}}" ./...'
      expected_output: "PASS"
    alternatives:
      - tool: "go-race"
        command: 'go test -race -v -run "{{TEST_NAME}}" ./...'
        expected_output: "PASS"

  benchmark:
    primary:
      tool: "go"
      command: 'go test -bench="{{TEST_NAME}}" -benchmem ./...'
      expected_output: "ns/op"

  coverage:
    primary:
      tool: "go"
      command: "go test -coverprofile=coverage.out ./... && go tool cover -func=coverage.out"
      expected_output: "total:"

# ============================================================================
# FALLBACK STRATEGY
# ============================================================================
# When primary tool is unavailable, use this decision tree
# ============================================================================
fallback_strategy:
  description: |
    Fallback order when primary verification tool is unavailable:
    1. Try alternatives in order
    2. Use language-native syntax check
    3. Use file existence + import check
    4. Last resort: manual verification instruction with clear criteria

  universal_fallbacks:
    # These work across most platforms
    file_exists:
      command: 'test -f "{{FILE_PATH}}" && echo "File exists"'
      expected_output: "File exists"

    file_not_empty:
      command: 'test -s "{{FILE_PATH}}" && echo "File has content"'
      expected_output: "File has content"

    git_diff:
      command: 'git diff --name-only HEAD~1 | grep -q "{{FILE_PATH}}" && echo "File was modified"'
      expected_output: "File was modified"

  manual_verification_template: |
    ## Manual Verification Required

    **Reason**: {{REASON}}

    **Steps**:
    1. {{STEP_1}}
    2. {{STEP_2}}
    3. {{STEP_3}}

    **Success Criteria**:
    - {{CRITERION_1}}
    - {{CRITERION_2}}

    **Automated fallback attempted**: {{FALLBACK_COMMAND}}

# ============================================================================
# COMPOSITE VERIFICATION PATTERNS
# ============================================================================
# Common multi-step verification patterns
# ============================================================================
composite_patterns:

  # Full API endpoint verification (backend)
  api_endpoint_full:
    description: "Verify API endpoint: build, lint, test, health check"
    steps:
      - name: "Lint"
        command: "{{LINT_COMMAND}}"
      - name: "Type Check"
        command: "{{TYPE_CHECK_COMMAND}}"
      - name: "Unit Test"
        command: "{{UNIT_TEST_COMMAND}}"
      - name: "Health Check"
        command: "{{API_HEALTH_COMMAND}}"
    combined_command: "{{LINT_COMMAND}} && {{TYPE_CHECK_COMMAND}} && {{UNIT_TEST_COMMAND}}"

  # Full UI component verification (frontend)
  ui_component_full:
    description: "Verify UI component: lint, type check, unit test, snapshot"
    steps:
      - name: "Lint"
        command: "{{LINT_COMMAND}}"
      - name: "Type Check"
        command: "{{TYPE_CHECK_COMMAND}}"
      - name: "Unit Test"
        command: "{{UNIT_TEST_COMMAND}}"
    combined_command: "{{LINT_COMMAND}} && {{TYPE_CHECK_COMMAND}} && {{UNIT_TEST_COMMAND}}"

  # Full mobile screen verification
  mobile_screen_full:
    description: "Verify mobile screen: build, lint, test, simulator run"
    steps:
      - name: "Lint"
        command: "{{LINT_COMMAND}}"
      - name: "Build"
        command: "{{BUILD_COMMAND}}"
      - name: "Unit Test"
        command: "{{UNIT_TEST_COMMAND}}"
    combined_command: "{{LINT_COMMAND}} && {{BUILD_COMMAND}} && {{UNIT_TEST_COMMAND}}"

  # Database migration verification
  database_migration:
    description: "Verify database migration: apply, verify schema, rollback test"
    steps:
      - name: "Apply Migration"
        command: "{{MIGRATION_UP_COMMAND}}"
      - name: "Verify Schema"
        command: "{{SCHEMA_CHECK_COMMAND}}"
      - name: "Rollback Test"
        command: "{{MIGRATION_DOWN_COMMAND}} && {{MIGRATION_UP_COMMAND}}"

# ============================================================================
# TOOL AVAILABILITY DETECTION
# ============================================================================
# Commands to check if a tool is available
# ============================================================================
tool_detection:
  npm: "command -v npm >/dev/null 2>&1"
  node: "command -v node >/dev/null 2>&1"
  npx: "command -v npx >/dev/null 2>&1"
  tsc: "npx tsc --version 2>/dev/null || command -v tsc >/dev/null 2>&1"
  eslint: "npx eslint --version 2>/dev/null"
  jest: "npx jest --version 2>/dev/null"
  vitest: "npx vitest --version 2>/dev/null"
  playwright: "npx playwright --version 2>/dev/null"

  xcodebuild: "command -v xcodebuild >/dev/null 2>&1"
  xcrun: "command -v xcrun >/dev/null 2>&1"
  swift: "command -v swift >/dev/null 2>&1"
  swiftlint: "command -v swiftlint >/dev/null 2>&1"
  fastlane: "command -v fastlane >/dev/null 2>&1 || bundle exec fastlane --version 2>/dev/null"

  gradle: "command -v gradle >/dev/null 2>&1 || ./gradlew --version 2>/dev/null"
  adb: "command -v adb >/dev/null 2>&1"
  ktlint: "./gradlew ktlintCheck --dry-run 2>/dev/null"

  flutter: "command -v flutter >/dev/null 2>&1"
  dart: "command -v dart >/dev/null 2>&1"

  python: "command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1"
  pytest: "python -m pytest --version 2>/dev/null"
  ruff: "command -v ruff >/dev/null 2>&1"
  mypy: "command -v mypy >/dev/null 2>&1"

  go: "command -v go >/dev/null 2>&1"
  golangci-lint: "command -v golangci-lint >/dev/null 2>&1"

  curl: "command -v curl >/dev/null 2>&1"
  jq: "command -v jq >/dev/null 2>&1"
  wget: "command -v wget >/dev/null 2>&1"
