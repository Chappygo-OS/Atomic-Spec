# ============================================================================
# PROJECT DEFAULTS REGISTRY
# ============================================================================
# This is the single source of truth for project-wide technical decisions.
# ALL commands, agents, and phases MUST read this file before generating
# specs, plans, or code. Deviations require explicit justification.
#
# DO NOT EDIT MANUALLY without updating changelog.md
# Updates require HITL (Human-In-The-Loop) approval via AskUserQuestion
# ============================================================================

version: 3
created: null  # Set when first decision is added
last_updated: null
last_updated_by: null

# ============================================================================
# TARGET PLATFORM (What type of application is being built)
# ============================================================================
# CRITICAL: This section determines which verification commands are used
# in generated tasks. See templates/verification-commands.yaml for details.
# ============================================================================
target_platform:
  # Primary deployment target: web | mobile | desktop | both
  # web = Browser-based application (SPA, SSR, etc.)
  # mobile = Native or cross-platform mobile app
  # desktop = Desktop application (Electron, Tauri, native)
  # both = Hybrid (e.g., web app + mobile app sharing backend)
  #        When primary = both:
  #        - mobile_framework MUST be set (ios, android, react-native, flutter)
  #        - mobile_platforms MUST be set (ios, android, or both)
  #        - backend.* section MUST be populated for the API tier
  #        - The appropriate mobile section (ios.*, android.*, react_native.*, flutter.*)
  #          MUST be populated for the mobile tier
  #        - /atomicspec.plan Phase 0.8 will interview for BOTH tech stacks
  primary: null

  # Mobile platforms (only if primary = mobile or both)
  # ios | android | both
  mobile_platforms: null

  # Mobile framework (only if mobile_platforms is set)
  # native = Swift/Kotlin native development
  # react-native = React Native / Expo
  # flutter = Flutter / Dart
  # capacitor = Web-based with Capacitor
  # cordova = Web-based with Cordova (legacy)
  mobile_framework: null

  # Desktop framework (only if primary = desktop)
  # electron | tauri | native | none
  desktop_framework: null

# ============================================================================
# MOBILE CONFIGURATION (Only if target_platform.mobile_platforms is set)
# ============================================================================
# Mobile-specific settings that affect task generation and verification.
# ============================================================================
mobile:
  # Push notification service: apns_fcm | onesignal | firebase | expo | none
  # apns_fcm = Direct APNs + FCM integration
  # onesignal = OneSignal unified service
  # firebase = Firebase Cloud Messaging (both platforms)
  # expo = Expo push notifications (React Native only)
  push_service: null

  # Offline strategy: offline_first | online_first | hybrid | none
  # offline_first = App works fully offline, syncs when online
  # online_first = Requires connection, limited offline cache
  # hybrid = Some features offline, others require connection
  offline_strategy: null

  # Local database: sqlite | realm | core_data | room | hive | drift | none
  # sqlite = Direct SQLite (both platforms)
  # realm = Realm database
  # core_data = iOS Core Data (iOS only)
  # room = Android Room (Android only)
  # hive = Hive (Flutter)
  # drift = Drift (Flutter, formerly Moor)
  local_database: null

  # Deep linking approach: universal_links | branch | firebase | appsflyer | custom | none
  # universal_links = iOS Universal Links + Android App Links
  # branch = Branch.io deep linking
  # firebase = Firebase Dynamic Links
  # appsflyer = AppsFlyer OneLink
  # custom = In-house scheme handler
  deep_linking: null

  # In-app purchase framework: storekit2 | billing_client | revenuecat | adapty | none
  # storekit2 = Apple StoreKit 2 (iOS only)
  # billing_client = Google Play Billing Library (Android only)
  # revenuecat = RevenueCat (cross-platform)
  # adapty = Adapty (cross-platform)
  iap_framework: null

  # Crash reporting: crashlytics | sentry | bugsnag | none
  crash_reporting: null

  # Mobile analytics: firebase_analytics | amplitude | mixpanel | none
  analytics: null

  # Certificate pinning: enabled | disabled
  # enabled = SSL certificate pinning for API calls
  cert_pinning: null

  # Biometric authentication: enabled | disabled
  # enabled = Face ID / Touch ID / fingerprint unlock integrated
  biometric_auth: null

  # App architecture pattern (iOS/Android native): mvvm | mvc | viper | clean | none
  # mvvm = Model-View-ViewModel
  # mvc = Model-View-Controller
  # viper = View-Interactor-Presenter-Entity-Router
  # clean = Clean Architecture
  app_architecture: null

# ============================================================================
# ARCHITECTURE (How the system is structured)
# ============================================================================
# These decisions affect EVERY part of the project and must be set early.
# Changing architecture mid-project is expensive - get this right first.
# ============================================================================
architecture:
  # Overall system pattern: monolith | modular_monolith | microservices | serverless
  # monolith = single deployable unit
  # modular_monolith = single deploy, internal module boundaries
  # microservices = distributed services
  # serverless = function-based (Lambda, Cloud Functions)
  pattern: null

  # Code organization layers: clean | mvc | hexagonal | vertical_slice | none
  # clean = Use Cases → Entities → Interfaces (Uncle Bob)
  # mvc = Model-View-Controller
  # hexagonal = Ports & Adapters
  # vertical_slice = Feature folders with all layers inside
  layers: null

  # API paradigm: rest | graphql | grpc | hybrid
  # hybrid = REST for external, gRPC for internal
  api_style: null

  # Service communication: sync | async | event_driven | cqrs
  # sync = Request-response (HTTP/gRPC)
  # async = Message queues (RabbitMQ, SQS)
  # event_driven = Event bus (Kafka, EventBridge)
  # cqrs = Command Query Responsibility Segregation
  communication: null

  # Monorepo vs polyrepo: monorepo | polyrepo
  repo_structure: null

# ============================================================================
# CODE PATTERNS (How code is written)
# ============================================================================
# These patterns ensure consistency in HOW developers write code.
# ============================================================================
code_patterns:
  # Data access pattern: repository | active_record | dao | raw_queries
  # repository = Repository pattern with interfaces
  # active_record = ORM models with query methods
  # dao = Data Access Objects
  # raw_queries = Direct SQL/queries
  data_access: null

  # Dependency injection: constructor | container | manual | none
  # constructor = Dependencies passed via constructor
  # container = IoC container (InversifyJS, tsyringe)
  # manual = Factory functions
  dependency_injection: null

  # Error handling strategy: exceptions | result_type | error_codes
  # exceptions = throw/catch (try-catch)
  # result_type = Result<T, E> or Either pattern
  # error_codes = Return codes with error objects
  error_handling: null

  # Async patterns: promises | async_await | callbacks | rxjs
  async_pattern: null

  # Validation approach: schema | decorators | manual
  # schema = Zod, Yup, Joi schemas
  # decorators = class-validator decorators
  # manual = Hand-written validation
  validation_approach: null

  # Null handling: nullable | optional | strict_null
  # nullable = Allow nulls, check at runtime
  # optional = Use Option/Maybe types
  # strict_null = TypeScript strict null checks, no nulls in domain
  null_handling: null

# ============================================================================
# API CONFIGURATION (How APIs are designed)
# ============================================================================
api:
  # Versioning strategy: url | header | query_param | none
  # url = /api/v1/*, header = X-API-Version, query_param = ?version=1
  versioning: null

  # Pagination strategy: cursor | offset | keyset | none
  pagination: null

  # Error response format: rfc7807 | custom | simple
  # rfc7807 = Problem Details (RFC 7807)
  error_format: null

  # Rate limiting approach: token_bucket | sliding_window | fixed_window | none
  rate_limiting: null

  # Idempotency requirement: required | optional | none
  idempotency: null

  # Resource naming: plural | singular
  # plural = /users, /orders
  # singular = /user, /order
  resource_naming: null

  # Request body format: json | form | multipart
  request_format: null

  # Auth header format: bearer | basic | api_key | custom
  auth_header: null

  # Response envelope: wrapped | flat
  # wrapped = { data: {...}, meta: {...} }
  # flat = { ...fields directly }
  response_envelope: null

  # Date format in API: iso8601 | unix_timestamp | custom
  date_format: null

# ============================================================================
# BACKEND CONFIGURATION
# ============================================================================
backend:
  # Primary language: typescript | python | go | java | csharp | rust | php
  language: null

  # Runtime version (e.g., "node:20", "python:3.12", "go:1.22")
  runtime_version: null

  # Web framework (e.g., "express", "fastapi", "gin", "spring-boot", "nestjs")
  framework: null

  # ORM / Data layer (e.g., "prisma", "drizzle", "sqlalchemy", "gorm", "typeorm")
  orm: null

  # Authentication method: jwt | session | oauth2 | api_key | saml
  auth_method: null

  # Authorization pattern: rbac | abac | acl | simple | none
  auth_pattern: null

  # Background jobs: bull | celery | sidekiq | none
  job_queue: null

  # Caching layer: redis | memcached | in_memory | none
  cache: null

# ============================================================================
# FRONTEND CONFIGURATION (Web)
# ============================================================================
# Used when target_platform.primary = web
# ============================================================================
frontend:
  # Framework: react | vue | angular | svelte | nextjs | nuxt | remix | none
  framework: null

  # Rendering strategy: spa | ssr | ssg | hybrid
  # spa = Single Page App (client-side only)
  # ssr = Server-Side Rendering
  # ssg = Static Site Generation
  # hybrid = Mix of SSR and SSG
  rendering: null

  # UI component library (e.g., "shadcn", "mui", "chakra", "tailwind-headless", "ant")
  ui_library: null

  # Styling approach: tailwind | css-modules | styled-components | scss | emotion
  styling: null

  # State management: zustand | redux | context | tanstack-query | pinia | none
  state_management: null

  # Data fetching: tanstack-query | swr | rtk-query | apollo | fetch
  data_fetching: null

  # Form handling: react-hook-form | formik | vee-validate | native
  form_library: null

  # Validation library: zod | yup | joi | valibot | native
  validation_library: null

  # Routing: react-router | tanstack-router | next-router | vue-router
  routing: null

